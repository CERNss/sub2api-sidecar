name: Security Scan

# Ported from the org-standard security scan (customer-service-feedback-platform),
# adapted for Python: pip-audit replaces govulncheck, and there is no private
# module access to set up.

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || secrets.PYTHON_VERSION || '3.12' }}

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pip-audit
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt

      - name: Audit test dependencies
        run: pip-audit -r requirements-dev.txt

  dockerfile-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check Dockerfile base image pins
        run: |
          set -euo pipefail
          grep -Eq '^FROM node:22-bookworm-slim AS frontend-builder$' Dockerfile
          grep -Eq '^FROM python:3\.12-slim-bookworm$' Dockerfile
