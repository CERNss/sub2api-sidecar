name: Security Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || secrets.PYTHON_VERSION || '3.12' }}

jobs:
  python-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install pip-audit
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pip-audit

      - name: Audit runtime dependencies
        run: pip-audit -r requirements.txt

      - name: Audit test dependencies
        run: pip-audit -r requirements-dev.txt

  dockerfile-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Dockerfile base image pin
        run: |
          grep -Eq '^FROM python:3\.12-slim-bookworm$' Dockerfile
