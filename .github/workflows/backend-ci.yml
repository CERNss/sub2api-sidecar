name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || secrets.PYTHON_VERSION || '3.12' }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sub2api_sidecar_test
          POSTGRES_USER: sub2api_sidecar
          POSTGRES_PASSWORD: sub2api_sidecar_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U sub2api_sidecar -d sub2api_sidecar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python sources
        run: python3 -m compileall app tests

      - name: Run tests
        env:
          TEST_POSTGRES_URL: 127.0.0.1
          TEST_POSTGRES_PORT: "55432"
          TEST_POSTGRES_USERNAME: sub2api_sidecar
          TEST_POSTGRES_NAME: sub2api_sidecar_test
          TEST_POSTGRES_PASSWORD: sub2api_sidecar_test
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
