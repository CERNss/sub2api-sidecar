name: Release

# Single-job release pipeline, ported from the org-standard CI/CD
# (customer-service-feedback-platform) and adapted for this repo:
#
# The whole release runs on one runner and keeps all intermediate files in the
# same workspace: validate -> package release assets -> build & push Docker
# image -> create GitHub Release -> notify the GitOps panel (if configured),
# which can auto-deploy the new image via opsagent.
#
# Repo-specific adaptations vs the standard:
# - runs-on ubuntu-latest: this personal repo has no org runner group; the only
#   registered self-hosted runner (a Mac mini) is usually offline and left every
#   release queued forever.
# - Registry is DockerHub (<namespace>/<repo>) via DOCKERHUB_USERNAME /
#   DOCKERHUB_TOKEN instead of the JHS registry.
# - Validation runs pytest against a PostgreSQL service container; the frontend
#   is typechecked and built inside the multi-stage Dockerfile.
# - No native binaries; release assets are the source bundle + VERSION.
#
# Image tags: the release version (X.Y.Z), the release commit short SHA, and
# `latest` unless PUBLISH_LATEST_TAG=false.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      platforms:
        description: 'Docker platforms (blank = use DOCKER_PLATFORMS var; default linux/amd64)'
        required: false
        type: string
        default: ''

env:
  PUBLISH_LATEST_TAG: ${{ vars.PUBLISH_LATEST_TAG || secrets.PUBLISH_LATEST_TAG || 'true' }}
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || secrets.PYTHON_VERSION || '3.12' }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sub2api_sidecar_test
          POSTGRES_USER: sub2api_sidecar
          POSTGRES_PASSWORD: sub2api_sidecar_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U sub2api_sidecar -d sub2api_sidecar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
      # GitOps panel webhook: when PANEL_URL / PANEL_WEBHOOK_TOKEN are configured
      # the panel receives pipeline events and (on success) can auto-deploy the
      # image via opsagent. Unconfigured -> steps skip with a notice.
      PANEL_URL: ${{ secrets.PANEL_URL || vars.PANEL_URL }}
      PANEL_WEBHOOK_TOKEN: ${{ secrets.PANEL_WEBHOOK_TOKEN }}
    steps:
      - name: Resolve release context
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${INPUT_TAG}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          TAG_NAME="${TAG_NAME#refs/tags/}"
          if [ -z "${TAG_NAME}" ]; then
            echo "Release tag is required"
            exit 1
          fi

          case "${TAG_NAME}" in
            v*) ;;
            *)
              echo "Release tag must start with v: ${TAG_NAME}"
              exit 1
              ;;
          esac

          {
            echo "release_ref=${TAG_NAME}"
            echo "release_tag=${TAG_NAME}"
            echo "release_version=${TAG_NAME#v}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout release ref
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.release.outputs.release_ref }}
          fetch-depth: 0

      - name: Require release tag on main
        id: commit
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin +refs/heads/main:refs/remotes/origin/main --tags --force --prune

          TAG_COMMIT="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          if ! git show-ref --verify --quiet refs/remotes/origin/main; then
            echo "origin/main is required for release validation."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "Release tag ${RELEASE_TAG} points to ${TAG_COMMIT}, which is not contained in origin/main."
            echo "Merge into main first, then create the release tag from main."
            exit 1
          fi

          echo "Release tag ${RELEASE_TAG} is contained in origin/main."
          echo "release_commit=${TAG_COMMIT}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${TAG_COMMIT:0:7}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker platforms
        id: platforms
        shell: bash
        env:
          INPUT_PLATFORMS: ${{ github.event.inputs.platforms }}
          VAR_PLATFORMS: ${{ vars.DOCKER_PLATFORMS || secrets.DOCKER_PLATFORMS }}
        run: |
          set -euo pipefail

          PLATFORMS="${INPUT_PLATFORMS:-}"
          if [ -z "${PLATFORMS}" ]; then
            PLATFORMS="${VAR_PLATFORMS:-}"
          fi
          if [ -z "${PLATFORMS}" ]; then
            PLATFORMS="linux/amd64"
          fi

          echo "platforms=${PLATFORMS}" >> "$GITHUB_OUTPUT"

      - name: Resolve image metadata
        id: meta
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          RAW_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE || secrets.DOCKERHUB_IMAGE }}
          RAW_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_NAMESPACE }}
          DEFAULT_IMAGE_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          lower() {
            echo "$1" | tr '[:upper:]' '[:lower:]'
          }

          IMAGE_NAME="${RAW_IMAGE_NAME:-$DEFAULT_IMAGE_NAME}"
          IMAGE_NAME="$(lower "$IMAGE_NAME")"
          BUNDLE_NAME="${IMAGE_NAME}-${RELEASE_VERSION}.tar.gz"

          NAMESPACE="${RAW_NAMESPACE:-${DOCKERHUB_USERNAME:-}}"
          NAMESPACE="$(lower "$NAMESPACE")"
          if [ -z "${NAMESPACE}" ]; then
            echo "DOCKERHUB_NAMESPACE or DOCKERHUB_USERNAME is required."
            exit 1
          fi
          REPOSITORY="${NAMESPACE}/${IMAGE_NAME}"

          {
            echo "image_name=${IMAGE_NAME}"
            echo "bundle_name=${BUNDLE_NAME}"
            echo "repository=${REPOSITORY}"
          } >> "$GITHUB_OUTPUT"

      - name: Notify GitOps panel (pipeline running)
        shell: bash
        env:
          PIPELINE_ID: ${{ github.run_id }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [ -z "${PANEL_URL:-}" ] || [ -z "${PANEL_WEBHOOK_TOKEN:-}" ]; then
            echo "::notice::PANEL_URL / PANEL_WEBHOOK_TOKEN not configured; skipping panel notify."
            exit 0
          fi

          BODY="$(jq -cn \
            --arg pid "${PIPELINE_ID}" \
            --arg ref "${RELEASE_TAG}" \
            --arg cref "${GITHUB_REPOSITORY}" \
            '{status: "running", stage: "build", pipeline_id: $pid, ref: $ref, ci_ref: $cref}')"

          curl -fsS -m 15 -X POST "${PANEL_URL%/}/api/v1/webhook/cicd/${PANEL_WEBHOOK_TOKEN}" \
            -H 'Content-Type: application/json' --data "${BODY}" \
            || echo "::warning::panel running notify failed (continuing)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Validate backend
        env:
          TEST_POSTGRES_URL: 127.0.0.1
          TEST_POSTGRES_PORT: "55432"
          TEST_POSTGRES_USERNAME: sub2api_sidecar
          TEST_POSTGRES_NAME: sub2api_sidecar_test
          TEST_POSTGRES_PASSWORD: sub2api_sidecar_test
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt
          python3 -m compileall app tests
          pytest

      - name: Package release assets
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle_name }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
          PLATFORMS: ${{ steps.platforms.outputs.platforms }}
          REPOSITORY: ${{ steps.meta.outputs.repository }}
        run: |
          set -euo pipefail

          rm -rf .release-artifacts
          mkdir -p .release-artifacts/version

          printf '%s\n' "${RELEASE_VERSION}" > .release-artifacts/version/VERSION

          git archive \
            --format=tar.gz \
            --prefix="${IMAGE_NAME}-${RELEASE_VERSION}/" \
            --output=".release-artifacts/${BUNDLE_NAME}" \
            HEAD

          TAG_MESSAGE="$(git tag -l --format='%(contents:body)' "${RELEASE_TAG}" || true)"

          {
            echo "# ${RELEASE_TAG}"
            echo
            if [ -n "${TAG_MESSAGE}" ]; then
              printf '%s\n' "${TAG_MESSAGE}"
            else
              echo "Automated release for ${RELEASE_TAG}."
            fi
            echo
            echo "## Docker images"
            echo
            echo "Platforms: ${PLATFORMS}"
            echo "Release commit: ${SHORT_SHA}"
            echo
            echo "- ${REPOSITORY}:${RELEASE_VERSION}"
            echo "- ${REPOSITORY}:${SHORT_SHA}"
            if [ "${PUBLISH_LATEST_TAG}" != "false" ]; then
              echo "- ${REPOSITORY}:latest"
            fi
          } > .release-artifacts/release-notes.md

      - name: Set up QEMU
        if: ${{ runner.os == 'Linux' }}
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to DockerHub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        env:
          REPOSITORY: ${{ steps.meta.outputs.repository }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
        run: |
          set -euo pipefail

          TAGS="${REPOSITORY}:${RELEASE_VERSION},${REPOSITORY}:${SHORT_SHA}"
          if [ "${PUBLISH_LATEST_TAG}" != "false" ]; then
            TAGS="${TAGS},${REPOSITORY}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.release_commit }}
            org.opencontainers.image.version=${{ steps.release.outputs.release_version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_tag }}
          body_path: .release-artifacts/release-notes.md
          files: |
            .release-artifacts/${{ steps.meta.outputs.bundle_name }}
            .release-artifacts/version/VERSION

      - name: Notify GitOps panel (success → auto-deploy)
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.repository }}:${{ steps.commit.outputs.short_sha }}
          PIPELINE_ID: ${{ github.run_id }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [ -z "${PANEL_URL:-}" ] || [ -z "${PANEL_WEBHOOK_TOKEN:-}" ]; then
            echo "::notice::PANEL_URL / PANEL_WEBHOOK_TOKEN not configured; skipping panel deploy notify."
            exit 0
          fi

          BODY="$(jq -cn \
            --arg image "${IMAGE}" \
            --arg pid "${PIPELINE_ID}" \
            --arg ref "${RELEASE_TAG}" \
            --arg cref "${GITHUB_REPOSITORY}" \
            '{status: "success", stage: "release", image: $image, pipeline_id: $pid, ref: $ref, ci_ref: $cref}')"

          HTTP_CODE="$(curl -sS -m 20 -w '%{http_code}' -o /tmp/panel-notify.json \
            -X POST "${PANEL_URL%/}/api/v1/webhook/cicd/${PANEL_WEBHOOK_TOKEN}" \
            -H 'Content-Type: application/json' --data "${BODY}")"

          echo "HTTP ${HTTP_CODE}"
          cat /tmp/panel-notify.json || true
          echo

          # 202 = accepted; the panel deploys asynchronously via opsagent under
          # its status-lock, so CI never blocks on the docker pull.
          if [ "${HTTP_CODE}" != "202" ] && [ "${HTTP_CODE}" != "200" ]; then
            echo "panel deploy notify failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
