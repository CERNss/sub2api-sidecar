name: ci

# Ported from the org-standard CI (customer-service-feedback-platform), adapted
# for this Python/React repo: hosted runners (no org runner group here), pytest
# against a PostgreSQL service instead of the Go toolchain, and no private-module
# GitHub App token (no private dependencies). `develop` is included in push
# triggers because this repo integrates on develop before merging to main.

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || secrets.PYTHON_VERSION || '3.12' }}

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sub2api_sidecar_test
          POSTGRES_USER: sub2api_sidecar
          POSTGRES_PASSWORD: sub2api_sidecar_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U sub2api_sidecar -d sub2api_sidecar_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # persist-credentials: false — drop the default GITHUB_TOKEN credential
      # injected by checkout; nothing below needs authenticated git access.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile Python sources
        run: python3 -m compileall app tests

      - name: Test
        env:
          TEST_POSTGRES_URL: 127.0.0.1
          TEST_POSTGRES_PORT: "55432"
          TEST_POSTGRES_USERNAME: sub2api_sidecar
          TEST_POSTGRES_NAME: sub2api_sidecar_test
          TEST_POSTGRES_PASSWORD: sub2api_sidecar_test
        run: pytest

      - name: Validate compose config
        run: |
          cp .env.example .env
          docker compose config >/dev/null

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # End-to-end verification that the multi-stage Dockerfile (frontend build
      # included) still builds; CI never pushes — pushing happens in release.yml.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
