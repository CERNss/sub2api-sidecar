app:
  base_url: http://127.0.0.1:8000
  # Set to /sidecar when this service is exposed behind a path-stripping proxy.
  base_path: ""
  auth_username: admin
  access_key_ttl_hours: 12

database:
  url: sidecar-postgres
  port: 5432
  username: sub2api_sidecar
  name: sub2api_sidecar

openai:
  oauth_redirect_uri: http://localhost:1455/auth/callback

sub2api:
  base_url: http://localhost:8080
  request_timeout_seconds: 30
  # For multiple upstream Sub2API instances, replace base_url with:
  # upstreams:
  #   - id: main
  #     name: Main Sub2API
  #     base_url: http://sub2api-main:8080
  #     admin_api_key_env: SUB2API_ADMIN_API_KEY
  #   - id: backup
  #     name: Backup Sub2API
  #     base_url: http://sub2api-backup:8080
  #     admin_api_key_env: SUB2API_BACKUP_ADMIN_API_KEY
  #     request_timeout_seconds: 30
  provisioning_defaults:
    group_platform: openai
    account_provider: openai
    account_platform: openai
    account_type: oauth
    account_ws_mode: context_pool
    account_concurrency: 5
    account_model_whitelist:
      - gpt-5.3-codex
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.5
    account_temporary_unschedulable: true
    account_temporary_unschedulable_rules:
      - error_code: "529"
        duration_minutes: 60
        keywords:
          - overloaded
          - too many
        description: 服务过载 - 暂停 60 分钟
      - error_code: "429"
        duration_minutes: 10
        keywords:
          - rate limit
          - too many requests
        description: 触发限流 - 暂停 10 分钟
      - error_code: "503"
        duration_minutes: 30
        keywords:
          - unavailable
          - maintenance
        description: 服务不可用 - 暂停 30 分钟
