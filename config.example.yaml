app:
  base_url: https://sub2api.tcgcard.jp/sidecar
  base_path: /sidecar
  auth_username: admin
  access_key_ttl_hours: 12

database:
  url: sidecar-postgres
  port: 5432
  username: sub2api_sidecar
  name: sub2api_sidecar

openai:
  oauth_redirect_uri: https://sub2api.tcgcard.jp/sidecar/auth/callback

notifications:
  account_invalid_whitelist:
    ids: []
    names: []
    emails: []

sub2api:
  request_timeout_seconds: 30
  # Safety cap on how many usage-log rows a single fetch accumulates in memory.
  # 0 = unlimited (legacy). Prevents OOM when a day has a very large number of logs;
  # a hit is logged as a warning and may make that window's aggregates undercount.
  usage_log_max_items: 100000
  api_key_group_selection: random
  upstreams:
    - id: main
      name: 主站 Sub2API
      base_url: http://sub2api:8080
      admin_api_key_env: SUB2API_ADMIN_API_KEY

    - id: us-proxy-2
      name: US Proxy 2
      base_url: https://us-proxy-2.sub2api.tcgcard.jp
      admin_api_key_env: SUB2API_US_PROXY_2_ADMIN_API_KEY

  provisioning_defaults:
    account_concurrency: 6
    group_platform: openai
    account_provider: openai
    account_platform: openai
    account_type: oauth
    account_apikey_type: api_key
    account_ws_mode: context_pool
    account_model_whitelist:
      - gpt-5.3-codex
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.5
      - codex-auto-review
      - gpt-images-2
    account_temporary_unschedulable: true
    account_temporary_unschedulable_rules:
      - error_code: "529"
        duration_minutes: 60
        keywords:
          - overloaded
          - too many
        description: 服务过载 - 暂停 60 分钟
      - error_code: "429"
        duration_minutes: 10
        keywords:
          - rate limit
          - too many requests
        description: 触发限流 - 暂停 10 分钟
      - error_code: "503"
        duration_minutes: 30
        keywords:
          - unavailable
          - maintenance
        description: 服务不可用 - 暂停 30 分钟
