app:
  base_url: http://127.0.0.1:8000
  # Set to /sidecar when this service is exposed behind a path-stripping proxy.
  base_path: ""
  auth_username: admin
  access_key_ttl_hours: 12

storage:
  sqlite_db_path: ./data/sub2api-sidecar.db

openai:
  oauth_redirect_uri: http://localhost:1455/auth/callback

sub2api:
  base_url: http://localhost:8080
  request_timeout_seconds: 30
  provisioning_defaults:
    group_platform: openai
    account_provider: openai
    account_platform: openai
    account_type: oauth
    account_ws_mode: context_pool
    account_concurrency: 5
    account_model_whitelist:
      - gpt-5.3-codex
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.5
    account_temporary_unschedulable: true
    account_temporary_unschedulable_rules:
      - error_code: "529"
        duration_minutes: 60
        keywords:
          - overloaded
          - too many
        description: 服务过载 - 暂停 60 分钟
      - error_code: "429"
        duration_minutes: 10
        keywords:
          - rate limit
          - too many requests
        description: 触发限流 - 暂停 10 分钟
      - error_code: "503"
        duration_minutes: 30
        keywords:
          - unavailable
          - maintenance
        description: 服务不可用 - 暂停 30 分钟

provisioning:
  # Dedicated provisioning now uses the raw email as the Sub2API group name.
  # This legacy prefix setting is kept for config compatibility.
  group_name_prefix: openai-oauth-
  assignment_mode: dedicated

auto_rotation:
  enabled: false
  interval_seconds: 0
  cooldown_minutes: 0
  usage_window: 1d
  usage_thresholds: []
  # Skip the rebalance loop entirely when (max group load - min group load) <= imbalance_epsilon.
  imbalance_epsilon: 0.0
  # Per-user move requires after_gap < before_gap - improvement_delta to avoid flapping near optimum.
  improvement_delta: 0.0
