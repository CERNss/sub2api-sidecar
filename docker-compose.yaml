services:
  sub2api-sidecar:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sub2api-sidecar
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
