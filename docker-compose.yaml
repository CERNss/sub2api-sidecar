services:
  sub2api-sidecar:
    image: cernss/sub2api-sidecar:latest
    pull_policy: always
    container_name: sub2api-sidecar
    env_file:
      - .env
    environment:
      CONFIG_PATH: /app/config.yaml
    ports:
      - "8000:8000"
    networks:
      - sub2api-sidecar
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; [urllib.request.urlopen(f'http://127.0.0.1:8000{path}') for path in ('/health', '/ping')]"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  sub2api-sidecar:
    name: sub2api-sidecar
    driver: bridge
